			shellScript = "set -e\n\nBACKEND_SRC=\"${SRCROOT}/../backend\"\nBACKEND_DST=\"${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/backend\"\n\nRUNTIME_SRC=\"${SRCROOT}/../runtime\"\nRUNTIME_DST=\"${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/runtime\"\n\nif [ ! -d \"${BACKEND_SRC}\" ]; then\n  echo \"Backend source folder not found: ${BACKEND_SRC}\"\n  exit 1\nfi\n\nif [ ! -d \"${RUNTIME_SRC}\" ]; then\n  echo \"Runtime source folder not found: ${RUNTIME_SRC}\"\n  exit 1\nfi\n\nrm -rf \"${BACKEND_DST}\" \"${RUNTIME_DST}\"\nmkdir -p \"${BACKEND_DST}\" \"${RUNTIME_DST}\"\n\n# Copy backend, including hidden files like .co\nrsync -a \\\n  --exclude=\"__pycache__\" \\\n  --exclude=\"*.pyc\" \\\n  --exclude=\".DS_Store\" \\\n  --exclude=\".git\" \\\n  --exclude=\".gitignore\" \\\n  --exclude=\".env\" \\\n  --exclude=\"token.json\" \\\n  --exclude=\".co/evals\" \\\n  --exclude=\".co/logs\" \\\n  \"${BACKEND_SRC}/\" \"${BACKEND_DST}/\"\n\n# Copy runtime\nrsync -a \\\n  --exclude=\"__pycache__\" \\\n  --exclude=\"*.pyc\" \\\n  --exclude=\".DS_Store\" \\\n  \"${RUNTIME_SRC}/\" \"${RUNTIME_DST}/\"\n\n# Make bundled python executable\nif [ -f \"${RUNTIME_DST}/venv/bin/python\" ]; then\n  chmod +x \"${RUNTIME_DST}/venv/bin/python\"\nfi\n\necho \"Backend copied to ${BACKEND_DST}\"\necho \"Runtime copied to ${RUNTIME_DST}\"\n";
